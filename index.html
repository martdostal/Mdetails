<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match Detail - Settlement</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0c10;
      --bg-secondary: #12141a;
      --bg-card: #181b23;
      --bg-surface: #1e212b;
      --bg-input: #111318;
      --bg-elevated: #222533;
      --border-primary: #262937;
      --border-subtle: #1e2130;
      --border-focus: #4a5068;
      --text-primary: #e8eaef;
      --text-secondary: #9aa0b0;
      --text-muted: #5a6070;
      --green: #22c55e;
      --green-bg: rgba(34, 197, 94, 0.10);
      --green-border: rgba(34, 197, 94, 0.22);
      --red: #ef4444;
      --red-bg: rgba(239, 68, 68, 0.10);
      --red-border: rgba(239, 68, 68, 0.22);
      --orange: #f59e0b;
      --orange-bg: rgba(245, 158, 11, 0.10);
      --orange-border: rgba(245, 158, 11, 0.22);
      --blue: #3b82f6;
      --blue-bg: rgba(59, 130, 246, 0.10);
      --blue-border: rgba(59, 130, 246, 0.22);
      --purple: #8b5cf6;
      --settled: #10b981;
      --settled-bg: rgba(16, 185, 129, 0.10);
      --settled-border: rgba(16, 185, 129, 0.22);
      --void: #6b7280;
      --void-bg: rgba(107, 114, 128, 0.10);
      --void-border: rgba(107, 114, 128, 0.22);
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-xs: 3px;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
      height: 100vh;
    }
    #root { height: 100vh; display: flex; flex-direction: column; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2d38; border-radius: 3px; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes countdownPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
    }
    @keyframes progressShrink {
      from { width: 100%; }
      to { width: 0%; }
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      padding: 0 20px;
      display: flex;
      align-items: center;
      height: 44px;
      flex-shrink: 0;
      gap: 16px;
    }
    .top-bar__back {
      display: flex; align-items: center; gap: 6px;
      color: var(--text-muted); font-size: 12px; cursor: pointer;
      padding: 4px 8px; border-radius: var(--radius-sm);
      border: none; background: none; transition: all 0.15s;
    }
    .top-bar__back:hover { color: var(--text-secondary); background: var(--bg-surface); }
    .top-bar__sep { width: 1px; height: 24px; background: var(--border-primary); }
    .top-bar__id {
      font-family: var(--font-mono); font-size: 12px; color: var(--text-muted);
      background: var(--bg-input); padding: 3px 10px; border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
    }
    .top-bar__sport { font-size: 12px; color: var(--text-secondary); }
    .top-bar__date { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
    .top-bar__right { margin-left: auto; display: flex; gap: 12px; align-items: center; }
    .top-bar__kbd { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-muted); }
    .kbd {
      font-family: var(--font-mono); font-size: 10px; padding: 2px 6px;
      background: var(--bg-input); border: 1px solid var(--border-primary);
      border-radius: 3px; color: var(--text-muted);
    }

    /* ===== MATCH HERO ===== */
    .match-hero {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 28px;
      flex-shrink: 0;
    }
    .match-hero__teams { display: flex; align-items: center; gap: 16px; }
    .match-hero__team { text-align: center; min-width: 110px; }
    .match-hero__team-name { font-size: 15px; font-weight: 700; }
    .match-hero__team-meta { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
    .match-hero__score-block { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .match-hero__score {
      font-family: var(--font-mono); font-size: 26px; font-weight: 800;
      letter-spacing: 4px; background: var(--bg-surface); padding: 3px 14px;
      border-radius: var(--radius-md); border: 1px solid var(--border-primary);
    }
    .match-hero__live {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--green);
    }
    .match-hero__live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green); animation: pulse 1.5s infinite;
    }
    .match-hero__divider { width: 1px; height: 44px; background: var(--border-primary); }
    .match-hero__stats { display: flex; gap: 20px; }
    .match-hero__stat { display: flex; flex-direction: column; gap: 1px; }
    .match-hero__stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .match-hero__stat-value { font-family: var(--font-mono); font-size: 14px; font-weight: 700; }
    .match-hero__global { margin-left: auto; display: flex; gap: 8px; }

    .btn {
      font-family: var(--font-sans); font-size: 12px; font-weight: 600;
      padding: 7px 16px; border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.15s; border: 1px solid transparent;
      display: flex; align-items: center; gap: 6px;
    }
    .btn--open { background: var(--green); color: #000; border-color: var(--green); }
    .btn--open:hover { filter: brightness(1.1); }
    .btn--suspend { background: var(--orange); color: #000; border-color: var(--orange); }
    .btn--suspend:hover { filter: brightness(1.1); }
    .btn--ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-primary); }
    .btn--ghost:hover { background: var(--bg-surface); border-color: var(--border-focus); }
    .btn--danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .btn--danger:hover { background: rgba(239,68,68,0.18); }
    .btn--sm { font-size: 11px; padding: 4px 10px; }
    .btn--xs { font-size: 10px; padding: 3px 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }

    /* ===== MAIN LAYOUT ===== */
    .main-layout { flex: 1; display: flex; overflow: hidden; }

    /* ===== LEFT PANEL ===== */
    .left-panel {
      width: 256px; flex-shrink: 0; background: var(--bg-secondary);
      border-right: 1px solid var(--border-primary);
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .panel-section { padding: 16px; border-bottom: 1px solid var(--border-primary); }
    .panel-section__title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px;
    }
    .timeline { display: flex; flex-direction: column; gap: 2px; }
    .timeline-item {
      display: flex; align-items: center; gap: 10px; padding: 8px 10px;
      border-radius: var(--radius-sm); cursor: pointer; transition: background 0.12s;
    }
    .timeline-item:hover { background: var(--bg-surface); }
    .timeline-item--active { background: var(--bg-surface); }
    .timeline-item__dot {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .timeline-item__dot--done { background: var(--green-bg); color: var(--green); border: 1.5px solid var(--green-border); }
    .timeline-item__dot--live { background: var(--blue-bg); color: var(--blue); border: 1.5px solid var(--blue-border); box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
    .timeline-item__dot--pending { background: var(--bg-input); color: var(--text-muted); border: 1.5px solid var(--border-primary); }
    .timeline-item__dot--cancelled { background: var(--red-bg); color: var(--red); border: 1.5px solid var(--red-border); }
    .timeline-item__body { flex: 1; min-width: 0; }
    .timeline-item__name { font-size: 12px; font-weight: 600; }
    .timeline-item__status { font-size: 10px; color: var(--text-muted); }
    .timeline-item__status--live { color: var(--green); font-weight: 600; }
    .timeline-item__score { font-family: var(--font-mono); font-size: 11px; font-weight: 700; color: var(--text-secondary); }
    .timeline-connector { width: 1px; height: 6px; background: var(--border-primary); margin-left: 23px; }

    .flow-actions { display: flex; flex-direction: column; gap: 6px; }
    .flow-btn {
      font-family: var(--font-sans); width: 100%; padding: 8px 12px; font-size: 12px;
      font-weight: 600; border-radius: var(--radius-sm); cursor: pointer;
      transition: all 0.15s; text-align: left; display: flex; align-items: center; gap: 8px;
    }
    .flow-btn--primary { background: var(--blue); color: #fff; border: none; }
    .flow-btn--primary:hover { filter: brightness(1.1); }
    .flow-btn--secondary { background: var(--bg-surface); color: var(--text-secondary); border: 1px solid var(--border-primary); }
    .flow-btn--secondary:hover { background: var(--bg-elevated); border-color: var(--border-focus); }
    .flow-btn--danger { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .flow-btn--danger:hover { background: rgba(239,68,68,0.18); }
    .flow-btn__icon { font-size: 14px; width: 18px; text-align: center; }

    .quick-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .quick-stat {
      background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm); padding: 8px 10px;
    }
    .quick-stat__label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.3px; }
    .quick-stat__value { font-family: var(--font-mono); font-size: 14px; font-weight: 700; margin-top: 2px; }

    /* ===== CENTER PANEL ===== */
    .center-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

    /* Market Tabs */
    .market-tabs {
      display: flex; align-items: center; gap: 2px; padding: 8px 16px;
      background: var(--bg-secondary); border-bottom: 1px solid var(--border-primary);
      flex-shrink: 0; overflow-x: auto;
    }
    .market-tab {
      font-family: var(--font-sans); font-size: 12px; font-weight: 500;
      padding: 6px 14px; border: none; background: transparent; color: var(--text-muted);
      cursor: pointer; border-radius: var(--radius-sm); transition: all 0.12s;
      white-space: nowrap; display: flex; align-items: center; gap: 6px;
    }
    .market-tab:hover { color: var(--text-secondary); background: var(--bg-surface); }
    .market-tab--active { background: var(--bg-surface); color: var(--text-primary); font-weight: 600; }
    .market-tab__count {
      font-size: 10px; font-family: var(--font-mono);
      background: var(--bg-input); padding: 1px 6px; border-radius: 8px; color: var(--text-muted);
    }
    .market-tab--active .market-tab__count { background: var(--blue-bg); color: var(--blue); }
    .market-tabs__spacer { flex: 1; }
    .market-tabs__summary { display: flex; gap: 12px; font-size: 11px; color: var(--text-muted); align-items: center; }
    .market-tabs__dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 4px; }

    .market-search {
      display: flex; align-items: center; gap: 6px; padding: 5px 10px;
      background: var(--bg-input); border: 1px solid var(--border-primary);
      border-radius: var(--radius-sm); margin-right: 8px;
    }
    .market-search__input {
      background: none; border: none; color: var(--text-primary);
      font-family: var(--font-sans); font-size: 12px; outline: none; width: 140px;
    }
    .market-search__input::placeholder { color: var(--text-muted); }

    /* Market List */
    .market-list { flex: 1; overflow-y: auto; padding: 12px 16px; }

    /* Market Group */
    .market-group { margin-bottom: 16px; }
    .market-group__header {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 0; margin-bottom: 8px;
    }
    .market-group__title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-muted);
    }
    .market-group__line { flex: 1; height: 1px; background: var(--border-subtle); }
    .market-group__count { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }

    /* ===== MARKET CARD (Settlement-focused) ===== */
    .mkt {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.12s;
    }
    .mkt:hover { border-color: var(--border-primary); }
    .mkt--open { border-left: 3px solid var(--blue); }
    .mkt--settled { border-left: 3px solid var(--settled); }
    .mkt--void { border-left: 3px solid var(--void); }
    .mkt--settling { border-left: 3px solid var(--orange); }
    .mkt--bet-closed { border-left: 3px solid var(--red); }

    .mkt__header {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; cursor: pointer; user-select: none;
    }
    .mkt__name { font-size: 13px; font-weight: 600; flex: 1; min-width: 0; }
    .mkt__specifier {
      font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
      background: var(--bg-input); padding: 1px 6px; border-radius: var(--radius-xs); margin-left: 4px;
    }
    .mkt__badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.4px; padding: 2px 8px; border-radius: 10px;
    }
    .mkt__badge--open { background: var(--blue-bg); color: var(--blue); border: 1px solid var(--blue-border); }
    .mkt__badge--settled { background: var(--settled-bg); color: var(--settled); border: 1px solid var(--settled-border); }
    .mkt__badge--void { background: var(--void-bg); color: var(--void); border: 1px solid var(--void-border); }
    .mkt__badge--settling { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
    .mkt__badge--bet-closed { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .mkt__chevron { color: var(--text-muted); font-size: 11px; transition: transform 0.15s; }
    .mkt__chevron--collapsed { transform: rotate(-90deg); }

    .mkt__body { padding: 0 14px 10px; }
    .mkt__body--hidden { display: none; }

    /* ===== SELECTIONS (Settlement-focused, no odds) ===== */
    .sel-grid {
      display: grid; gap: 4px;
    }
    .sel-grid--2 { grid-template-columns: 1fr 1fr; }
    .sel-grid--3 { grid-template-columns: 1fr 1fr 1fr; }
    .sel-grid--many { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }

    .sel {
      display: flex; align-items: center; justify-content: center;
      padding: 10px 14px; background: var(--bg-surface); border: 2px solid var(--border-subtle);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.12s;
      text-align: center; position: relative; min-height: 40px;
    }
    .sel:hover { background: var(--bg-elevated); border-color: var(--blue-border); }
    .sel--winner {
      background: var(--settled-bg); border-color: var(--settled-border);
      cursor: default;
    }
    .sel--winner .sel__name { color: var(--settled); font-weight: 700; }
    .sel--settling {
      border-color: var(--orange-border); background: var(--orange-bg);
      animation: countdownPulse 1s infinite;
    }
    .sel--settling .sel__name { color: var(--orange); font-weight: 700; }
    .sel--disabled {
      opacity: 0.35; cursor: default; pointer-events: none;
    }
    .sel--void-sel {
      opacity: 0.4; cursor: default;
      background: var(--void-bg); border-color: var(--void-border);
    }
    .sel__name { font-size: 12px; color: var(--text-primary); font-weight: 500; }
    .sel__winner-icon {
      position: absolute; top: 4px; right: 6px;
      font-size: 10px; color: var(--settled);
    }

    /* Countdown bar inside selection */
    .sel__countdown {
      position: absolute; bottom: 0; left: 0; height: 3px;
      background: var(--orange); border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      transition: none;
    }

    /* Market actions bar */
    .mkt__actions {
      display: flex; align-items: center; gap: 6px;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-subtle);
    }
    .mkt-btn {
      font-family: var(--font-sans); font-size: 10px; font-weight: 600;
      padding: 4px 10px; border-radius: var(--radius-xs); cursor: pointer;
      transition: all 0.12s; text-transform: uppercase; letter-spacing: 0.3px;
      border: 1px solid var(--border-primary); background: var(--bg-input); color: var(--text-muted);
    }
    .mkt-btn:hover { color: var(--text-primary); border-color: var(--border-focus); }
    .mkt-btn--cancel { color: var(--void); border-color: var(--void-border); }
    .mkt-btn--cancel:hover { background: var(--void-bg); }
    .mkt-btn--rollback { color: var(--purple); border-color: rgba(139,92,246,0.22); }
    .mkt-btn--rollback:hover { background: rgba(139,92,246,0.1); }
    .mkt-btn--stop { color: var(--red); border-color: var(--red-border); background: var(--red-bg); font-weight: 700; }
    .mkt-btn--stop:hover { background: rgba(239,68,68,0.18); }
    .mkt__actions-spacer { flex: 1; }
    .mkt__settling-info {
      font-size: 11px; color: var(--orange); font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .mkt__settling-countdown {
      font-family: var(--font-mono); font-size: 16px; font-weight: 800;
      color: var(--orange); min-width: 24px; text-align: center;
    }

    /* ===== MODALS ===== */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; animation: fadeIn 0.12s;
    }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg); padding: 20px;
      min-width: min(420px, 92vw); max-width: min(520px, 95vw);
      max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-lg);
      animation: slideIn 0.18s;
    }
    .modal__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .modal__title { font-size: 14px; font-weight: 700; }
    .modal__close {
      background: none; border: 1px solid var(--border-primary); color: var(--text-muted);
      cursor: pointer; font-size: 14px; padding: 2px 8px; border-radius: var(--radius-xs); line-height: 1;
    }
    .modal__close:hover { color: var(--text-primary); border-color: var(--text-muted); }

    .cancel-textarea {
      width: 100%; min-height: 80px; background: var(--bg-input);
      border: 1px solid var(--border-primary); border-radius: var(--radius-sm);
      color: var(--text-primary); font-family: var(--font-sans); font-size: 13px;
      padding: 10px; resize: vertical; margin-bottom: 12px; outline: none;
    }
    .cancel-textarea:focus { border-color: var(--blue); }
    .modal__actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* Group modal */
    .group-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm); margin-bottom: 4px;
    }
    .group-item__name { font-size: 12px; font-weight: 600; }
    .group-item__count { font-size: 10px; color: var(--text-muted); margin-left: 8px; }
    .group-item__actions { display: flex; gap: 4px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--bg-card); border: 1px solid var(--border-primary);
      border-radius: var(--radius-md); padding: 10px 16px; font-size: 12px;
      box-shadow: var(--shadow-lg); animation: slideIn 0.18s; z-index: 999;
      display: flex; align-items: center; gap: 8px;
    }
    .toast--success { border-color: var(--settled-border); color: var(--settled); }
    .toast--warning { border-color: var(--orange-border); color: var(--orange); }
    .toast--error { border-color: var(--red-border); color: var(--red); }
    .toast--info { border-color: var(--blue-border); color: var(--blue); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo, useRef } = React;

    // ===== DATA =====

    // Selection (settlement-focused: click = start settling)
    function SelectionBtn({ s, marketStatus, marketSettled, settlingSelId, countdownPct, onClick }) {
      const isSettled = marketStatus === 'settled';
      const isVoid = marketStatus === 'void';
      const isSettling = marketStatus === 'settling' && settlingSelId === s.id;
      const isWinner = isSettled && marketSettled === s.id;
      const isDisabled = (marketStatus === 'settling' && settlingSelId !== s.id) || (isSettled && !isWinner) || marketStatus === 'bet-closed';

      let cls = 'sel';
      if (isWinner) cls += ' sel--winner';
      else if (isSettling) cls += ' sel--settling';
      else if (isVoid) cls += ' sel--void-sel';
      else if (isDisabled) cls += ' sel--disabled';

      return (
        <div className={cls} onClick={(!isSettled && !isVoid && marketStatus !== 'bet-closed') ? () => onClick(s.id) : undefined}
          style={{ cursor: (isSettled || isVoid || marketStatus === 'bet-closed') ? 'default' : 'pointer' }}>
          <span className="sel__name">{s.name}</span>
          {isWinner && <span className="sel__winner-icon">\u2713</span>}
          {isSettling && <div className="sel__countdown" style={{ width: `${countdownPct}%` }}></div>}
        </div>
      );
    }

    // Market Card
    function MarketCard({ market, settlingState, onSelectionClick, onStopSettlement, onCancel, onRollback }) {
      const [collapsed, setCollapsed] = useState(false);
      const n = market.selections.length;
      const gridClass = n === 2 ? 'sel-grid--2' : n === 3 ? 'sel-grid--3' : 'sel-grid--many';
      const isSettling = market.status === 'settling';
      const countdown = settlingState?.countdown;
      const countdownPct = settlingState ? (settlingState.countdown / COUNTDOWN_SECONDS) * 100 : 0;

      const statusLabel = market.status === 'bet-closed' ? 'bet closed' : market.status;

      return (
        <div className={`mkt mkt--${market.status}`}>
          <div className="mkt__header" onClick={() => setCollapsed(!collapsed)}>
            <span className="mkt__name">
              {market.name}
              {market.specifier && <span className="mkt__specifier">{market.specifier}</span>}
            </span>
            <span className={`mkt__badge mkt__badge--${market.status}`}>{statusLabel}</span>
            <span className={`mkt__chevron ${collapsed ? 'mkt__chevron--collapsed' : ''}`}>&#9662;</span>
          </div>
          <div className={`mkt__body ${collapsed ? 'mkt__body--hidden' : ''}`}>
            <div className={`sel-grid ${gridClass}`}>
              {market.selections.map(s => (
                <SelectionBtn
                  key={s.id} s={s}
                  marketStatus={market.status}
                  marketSettled={market.settled}
                  settlingSelId={settlingState?.selectionId}
                  countdownPct={countdownPct}
                  onClick={onSelectionClick}
                />
              ))}
            </div>
            <div className="mkt__actions">
              {isSettling && (
                <>
                  <div className="mkt__settling-info">
                    <span className="mkt__settling-countdown">{countdown}</span>
                    <span>Settling as: <strong>{market.selections.find(s => s.id === settlingState?.selectionId)?.name}</strong></span>
                  </div>
                  <div className="mkt__actions-spacer"></div>
                  <button className="mkt-btn mkt-btn--stop" onClick={() => onStopSettlement(market.id)}>
                    Stop
                  </button>
                </>
              )}
              {!isSettling && (
                <>
                  {market.status !== 'void' && market.status !== 'settled' && (
                    <button className="mkt-btn mkt-btn--cancel" onClick={() => onCancel(market.id)}>Cancel</button>
                  )}
                  {market.status === 'settled' && (
                    <button className="mkt-btn mkt-btn--rollback" onClick={() => onRollback(market.id)}>Rollback</button>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // Cancel Modal (requires reason)
    function CancelModal({ market, onConfirm, onClose }) {
      const [reason, setReason] = useState('');
      return (
        <div className="overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal__header">
              <div className="modal__title">Cancel Market: {market.name}{market.specifier ? ` (${market.specifier})` : ''}</div>
              <button className="modal__close" onClick={onClose}>&times;</button>
            </div>
            <div style={{fontSize:12,color:'var(--text-secondary)',marginBottom:4}}>All bets for this market will be void.</div>
            <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:10}}>Please provide a reason:</div>
            <textarea className="cancel-textarea" placeholder="Reason for cancellation..." value={reason} onChange={e => setReason(e.target.value)} autoFocus />
            <div className="modal__actions">
              <button className="btn btn--ghost btn--sm" onClick={onClose}>Back</button>
              <button className="btn btn--danger btn--sm" style={{opacity: reason.trim() ? 1 : 0.4, cursor: reason.trim() ? 'pointer' : 'not-allowed'}}
                onClick={() => reason.trim() && onConfirm(market.id, reason)} disabled={!reason.trim()}>
                Cancel Market (Void)
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Group Modal
    function GroupModal({ markets, onGroupAction, onClose }) {
      const groups = {};
      markets.forEach(m => { if (!groups[m.group]) groups[m.group] = []; groups[m.group].push(m); });
      return (
        <div className="overlay" onClick={onClose}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal__header">
              <div className="modal__title">Market Groups</div>
              <button className="modal__close" onClick={onClose}>&times;</button>
            </div>
            {Object.entries(groups).map(([key, gm]) => {
              const openC = gm.filter(m => m.status === 'open').length;
              const settledC = gm.filter(m => m.status === 'settled').length;
              return (
                <div className="group-item" key={key}>
                  <span>
                    <span className="group-item__name">{MARKET_GROUPS[key]?.name || key}</span>
                    <span className="group-item__count">{openC} open / {settledC} settled / {gm.length} total</span>
                  </span>
                  <div className="group-item__actions">
                    <button className="btn btn--xs btn--open" style={{background:'var(--green-bg)',color:'var(--green)',border:'1px solid var(--green-border)'}} onClick={() => onGroupAction(key, 'open')}>Open</button>
                    <button className="btn btn--xs" style={{background:'var(--orange-bg)',color:'var(--orange)',border:'1px solid var(--orange-border)'}} onClick={() => onGroupAction(key, 'suspended')}>Suspend</button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function Toast({ message, type, onDone }) {
      useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, [onDone]);
      return <div className={`toast toast--${type}`}>{type === 'success' ? '\u2713' : type === 'warning' ? '\u26A0' : type === 'error' ? '\u2717' : '\u2139'} {message}</div>;
    }

    // ===== MAIN APP =====
    function App() {
      const [markets, setMarkets] = useState(initialMarkets);
      const [parts, setParts] = useState(initialParts);
      const [activeTab, setActiveTab] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');
      const [toast, setToast] = useState(null);
      const [matchTime, setMatchTime] = useState(62);
      const [modal, setModal] = useState(null); // { type: 'cancel', marketId }
      const [showGroupPopup, setShowGroupPopup] = useState(false);

      // Settlement countdowns: { [marketId]: { selectionId, countdown, intervalId } }
      const [settlingMap, setSettlingMap] = useState({});
      const settlingMapRef = useRef(settlingMap);
      settlingMapRef.current = settlingMap;

      // Match time simulation
      useEffect(() => {
        const interval = setInterval(() => setMatchTime(t => t < 90 ? t + 1 : t), 30000);
        return () => clearInterval(interval);
      }, []);

      // Keyboard
      useEffect(() => {
        const handler = e => {
          if (e.key === 'g' || e.key === 'G') { e.preventDefault(); setShowGroupPopup(p => !p); }
          if (e.key === 'Escape') { setShowGroupPopup(false); setModal(null); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      // Start settlement countdown
      const startSettlement = useCallback((marketId, selectionId) => {
        // If already settling this market, ignore
        if (settlingMapRef.current[marketId]) return;

        // Mark market as settling
        setMarkets(prev => prev.map(m => m.id === marketId ? { ...m, status: 'settling' } : m));

        // Create countdown
        let remaining = COUNTDOWN_SECONDS;
        const entry = { selectionId, countdown: remaining, intervalId: null };

        entry.intervalId = setInterval(() => {
          remaining -= 1;
          if (remaining <= 0) {
            // Settlement complete
            clearInterval(entry.intervalId);
            setSettlingMap(prev => {
              const next = { ...prev };
              delete next[marketId];
              return next;
            });
            setMarkets(prev => prev.map(m => m.id === marketId ? { ...m, status: 'settled', settled: selectionId } : m));
            setToast({ message: 'Market settled', type: 'success' });
          } else {
            setSettlingMap(prev => ({
              ...prev,
              [marketId]: { ...prev[marketId], countdown: remaining },
            }));
          }
        }, 1000);

        setSettlingMap(prev => ({ ...prev, [marketId]: entry }));
      }, []);

      // Stop settlement
      const stopSettlement = useCallback(marketId => {
        const entry = settlingMapRef.current[marketId];
        if (entry) {
          clearInterval(entry.intervalId);
          setSettlingMap(prev => {
            const next = { ...prev };
            delete next[marketId];
            return next;
          });
          setMarkets(prev => prev.map(m => m.id === marketId ? { ...m, status: 'open' } : m));
          setToast({ message: 'Settlement stopped', type: 'warning' });
        }
      }, []);

      // Handle selection click
      const handleSelectionClick = useCallback((marketId, selectionId) => {
        const market = markets.find(m => m.id === marketId);
        if (!market) return;

        // Only allow clicking on open markets (or if settling, clicking again stops it)
        if (market.status === 'settling') {
          // If clicking a different selection while settling, stop current and start new
          const current = settlingMapRef.current[marketId];
          if (current && current.selectionId === selectionId) {
            stopSettlement(marketId);
          } else {
            // Stop current, start new
            stopSettlement(marketId);
            // Small delay to let state update
            setTimeout(() => startSettlement(marketId, selectionId), 50);
          }
          return;
        }

        if (market.status !== 'open') return;
        startSettlement(marketId, selectionId);
      }, [markets, startSettlement, stopSettlement]);

      // Cancel market (void)
      const cancelMarket = useCallback((marketId, reason) => {
        // Stop any settlement in progress
        const entry = settlingMapRef.current[marketId];
        if (entry) { clearInterval(entry.intervalId); setSettlingMap(prev => { const n = { ...prev }; delete n[marketId]; return n; }); }

        setMarkets(prev => prev.map(m => m.id === marketId ? { ...m, status: 'void', settled: null } : m));
        setModal(null);
        setToast({ message: 'Market cancelled (void)', type: 'error' });
      }, []);

      // Rollback settled -> bet-closed
      const rollbackMarket = useCallback(marketId => {
        setMarkets(prev => prev.map(m => m.id === marketId ? { ...m, status: 'bet-closed', settled: null } : m));
        setToast({ message: 'Rolled back to BET CLOSED', type: 'info' });
      }, []);

      const handlePartAction = useCallback(action => {
        setToast({ message: `Action: ${action}`, type: 'info' });
      }, []);

      const handleGroupAction = useCallback((groupKey, status) => {
        setMarkets(prev => prev.map(m => {
          if (m.group !== groupKey || m.status === 'settled' || m.status === 'void') return m;
          return { ...m, status };
        }));
        setToast({ message: `Group ${status}`, type: status === 'open' ? 'success' : 'warning' });
        setShowGroupPopup(false);
      }, []);

      const openAll = useCallback(() => {
        setMarkets(prev => prev.map(m => (m.status === 'settled' || m.status === 'void') ? m : { ...m, status: 'open' }));
        setToast({ message: 'All markets opened', type: 'success' });
      }, []);
      const suspendAll = useCallback(() => {
        // Stop all settlements
        Object.entries(settlingMapRef.current).forEach(([, e]) => clearInterval(e.intervalId));
        setSettlingMap({});
        setMarkets(prev => prev.map(m => (m.status === 'settled' || m.status === 'void') ? m : { ...m, status: 'open' }));
        setToast({ message: 'All markets suspended', type: 'warning' });
      }, []);

      // Cleanup intervals on unmount
      useEffect(() => {
        return () => { Object.values(settlingMapRef.current).forEach(e => clearInterval(e.intervalId)); };
      }, []);

      // Filtering
      const filteredMarkets = useMemo(() => {
        let list = markets;
        if (activeTab !== 'all') list = list.filter(m => m.group === activeTab);
        if (searchQuery.trim()) {
          const q = searchQuery.toLowerCase();
          list = list.filter(m => m.name.toLowerCase().includes(q) || (m.specifier && m.specifier.includes(q)));
        }
        return list;
      }, [markets, activeTab, searchQuery]);

      const groupedMarkets = useMemo(() => {
        if (activeTab !== 'all') return { [activeTab]: filteredMarkets };
        const g = {};
        filteredMarkets.forEach(m => { if (!g[m.group]) g[m.group] = []; g[m.group].push(m); });
        return g;
      }, [filteredMarkets, activeTab]);

      const tabCounts = useMemo(() => {
        const c = { all: markets.length };
        markets.forEach(m => { c[m.group] = (c[m.group] || 0) + 1; });
        return c;
      }, [markets]);

      const statusCounts = useMemo(() => {
        const c = { open: 0, settling: 0, settled: 0, void: 0, 'bet-closed': 0 };
        markets.forEach(m => { if (c[m.status] !== undefined) c[m.status]++; });
        return c;
      }, [markets]);

      return (
        <>
          <TopBar />
          <MatchHero matchTime={matchTime} markets={markets} onOpenAll={openAll} onSuspendAll={suspendAll} />
          <div className="main-layout">
            <LeftPanel parts={parts} onPartAction={handlePartAction} />
            <div className="center-panel">
              <div className="market-tabs">
                {Object.entries(MARKET_GROUPS).map(([key, g]) => (
                  <button key={key} className={`market-tab ${activeTab === key ? 'market-tab--active' : ''}`} onClick={() => setActiveTab(key)}>
                    {g.name}
                    <span className="market-tab__count">{tabCounts[key] || 0}</span>
                  </button>
                ))}
                <div className="market-tabs__spacer"></div>
                <div className="market-search">
                  <span style={{color:'var(--text-muted)',fontSize:12}}>&#128269;</span>
                  <input className="market-search__input" placeholder="Search markets..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                </div>
                <div className="market-tabs__summary">
                  <span><span className="market-tabs__dot" style={{background:'var(--blue)'}}></span>{statusCounts.open}</span>
                  <span><span className="market-tabs__dot" style={{background:'var(--orange)'}}></span>{statusCounts.settling}</span>
                  <span><span className="market-tabs__dot" style={{background:'var(--settled)'}}></span>{statusCounts.settled}</span>
                  <span><span className="market-tabs__dot" style={{background:'var(--void)'}}></span>{statusCounts.void}</span>
                </div>
              </div>
              <div className="market-list">
                {Object.entries(groupedMarkets).map(([groupKey, gm]) => (
                  <div className="market-group" key={groupKey}>
                    {activeTab === 'all' && (
                      <div className="market-group__header">
                        <span className="market-group__title">{MARKET_GROUPS[groupKey]?.name || groupKey}</span>
                        <span className="market-group__line"></span>
                        <span className="market-group__count">{gm.length}</span>
                      </div>
                    )}
                    {gm.map(m => (
                      <MarketCard
                        key={m.id}
                        market={m}
                        settlingState={settlingMap[m.id]}
                        onSelectionClick={selId => handleSelectionClick(m.id, selId)}
                        onStopSettlement={stopSettlement}
                        onCancel={id => setModal({ type: 'cancel', marketId: id })}
                        onRollback={rollbackMarket}
                      />
                    ))}
                  </div>
                ))}
                {filteredMarkets.length === 0 && (
                  <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>No markets found</div>
                )}
              </div>
            </div>
          </div>

          {showGroupPopup && <GroupModal markets={markets} onGroupAction={handleGroupAction} onClose={() => setShowGroupPopup(false)} />}
          {modal?.type === 'cancel' && (
            <CancelModal market={markets.find(m => m.id === modal.marketId)} onConfirm={cancelMarket} onClose={() => setModal(null)} />
          )}
          {toast && <Toast message={toast.message} type={toast.type} onDone={() => setToast(null)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

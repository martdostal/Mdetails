<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiki - Match Detail</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0c10;
      --bg-secondary: #12141a;
      --bg-card: #181b23;
      --bg-card-hover: #1e2130;
      --bg-surface: #1e212b;
      --bg-input: #111318;
      --bg-elevated: #222533;
      --border-primary: #262937;
      --border-subtle: #1e2130;
      --border-focus: #4a5068;
      --text-primary: #e8eaef;
      --text-secondary: #9aa0b0;
      --text-muted: #5a6070;
      --green: #22c55e;
      --green-bg: rgba(34, 197, 94, 0.10);
      --green-border: rgba(34, 197, 94, 0.22);
      --red: #ef4444;
      --red-bg: rgba(239, 68, 68, 0.10);
      --red-border: rgba(239, 68, 68, 0.22);
      --orange: #f59e0b;
      --orange-bg: rgba(245, 158, 11, 0.10);
      --orange-border: rgba(245, 158, 11, 0.22);
      --blue: #3b82f6;
      --blue-bg: rgba(59, 130, 246, 0.10);
      --blue-border: rgba(59, 130, 246, 0.22);
      --purple: #8b5cf6;
      --purple-bg: rgba(139, 92, 246, 0.10);
      --purple-border: rgba(139, 92, 246, 0.22);
      --cyan: #06b6d4;
      --cyan-bg: rgba(6, 182, 212, 0.10);
      --settled: #10b981;
      --settled-bg: rgba(16, 185, 129, 0.10);
      --settled-border: rgba(16, 185, 129, 0.22);
      --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --radius-xs: 3px;
      --radius-sm: 5px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.4;
      overflow: hidden;
      height: 100vh;
    }

    #root { height: 100vh; display: flex; flex-direction: column; }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2d38; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3d48; }

    @keyframes flashGreen {
      0% { background-color: rgba(34, 197, 94, 0.25); }
      100% { background-color: transparent; }
    }
    @keyframes flashRed {
      0% { background-color: rgba(239, 68, 68, 0.25); }
      100% { background-color: transparent; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .flash-green { animation: flashGreen 0.6s ease-out; }
    .flash-red { animation: flashRed 0.6s ease-out; }

    /* ===== TOP BAR ===== */
    .top-bar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      padding: 0 20px;
      display: flex;
      align-items: center;
      height: 48px;
      flex-shrink: 0;
      gap: 16px;
    }
    .top-bar__back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      border: none;
      background: none;
      transition: all 0.15s;
    }
    .top-bar__back:hover { color: var(--text-secondary); background: var(--bg-surface); }
    .top-bar__sep { width: 1px; height: 24px; background: var(--border-primary); }
    .top-bar__match-id {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-input);
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
    }
    .top-bar__sport {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .top-bar__sport-icon {
      margin-right: 4px;
    }
    .top-bar__date {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .top-bar__actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .top-bar__kbd {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--text-muted);
    }
    .kbd {
      font-family: var(--font-mono);
      font-size: 10px;
      padding: 2px 6px;
      background: var(--bg-input);
      border: 1px solid var(--border-primary);
      border-radius: 3px;
      color: var(--text-muted);
    }

    /* ===== MATCH HEADER ===== */
    .match-hero {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      flex-shrink: 0;
    }
    .match-hero__teams {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .match-hero__team {
      text-align: center;
      min-width: 120px;
    }
    .match-hero__team-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
    }
    .match-hero__team-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .match-hero__score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .match-hero__score {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 4px;
      background: var(--bg-surface);
      padding: 4px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-primary);
    }
    .match-hero__live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--green);
    }
    .match-hero__live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 1.5s infinite;
    }
    .match-hero__divider {
      width: 1px;
      height: 48px;
      background: var(--border-primary);
    }
    .match-hero__info {
      display: flex;
      gap: 24px;
    }
    .match-hero__stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .match-hero__stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .match-hero__stat-value {
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 700;
    }
    .match-hero__stat-value--orange { color: var(--orange); }
    .match-hero__stat-value--blue { color: var(--blue); }
    .match-hero__stat-value--green { color: var(--green); }

    .match-hero__global-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }
    .btn {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn--open {
      background: var(--green);
      color: #000;
      border-color: var(--green);
    }
    .btn--open:hover { filter: brightness(1.1); }
    .btn--suspend {
      background: var(--orange);
      color: #000;
      border-color: var(--orange);
    }
    .btn--suspend:hover { filter: brightness(1.1); }
    .btn--danger {
      background: var(--red-bg);
      color: var(--red);
      border-color: var(--red-border);
    }
    .btn--danger:hover { background: rgba(239, 68, 68, 0.18); }
    .btn--ghost {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-primary);
    }
    .btn--ghost:hover { background: var(--bg-surface); border-color: var(--border-focus); }
    .btn--sm {
      font-size: 11px;
      padding: 4px 10px;
    }
    .btn--xs {
      font-size: 10px;
      padding: 3px 8px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ===== MAIN LAYOUT ===== */
    .main-layout {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ===== LEFT PANEL - Match Flow ===== */
    .left-panel {
      width: 260px;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-primary);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel-section {
      padding: 16px;
      border-bottom: 1px solid var(--border-primary);
    }
    .panel-section__title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Match Timeline */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .timeline-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .timeline-item:hover { background: var(--bg-surface); }
    .timeline-item--active { background: var(--bg-surface); }
    .timeline-item__indicator {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .timeline-item__indicator--completed {
      background: var(--green-bg);
      color: var(--green);
      border: 1.5px solid var(--green-border);
    }
    .timeline-item__indicator--active {
      background: var(--blue-bg);
      color: var(--blue);
      border: 1.5px solid var(--blue-border);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
    }
    .timeline-item__indicator--pending {
      background: var(--bg-input);
      color: var(--text-muted);
      border: 1.5px solid var(--border-primary);
    }
    .timeline-item__indicator--cancelled {
      background: var(--red-bg);
      color: var(--red);
      border: 1.5px solid var(--red-border);
    }
    .timeline-item__content {
      flex: 1;
      min-width: 0;
    }
    .timeline-item__name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .timeline-item__status {
      font-size: 10px;
      color: var(--text-muted);
    }
    .timeline-item__status--live { color: var(--green); font-weight: 600; }
    .timeline-item__status--ended { color: var(--text-muted); }
    .timeline-item__score {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
    }
    .timeline-connector {
      width: 1px;
      height: 8px;
      background: var(--border-primary);
      margin-left: 23px;
    }

    /* Match Flow Actions */
    .flow-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .flow-btn {
      font-family: var(--font-sans);
      width: 100%;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .flow-btn--primary {
      background: var(--blue);
      color: #fff;
      border: none;
    }
    .flow-btn--primary:hover { filter: brightness(1.1); }
    .flow-btn--secondary {
      background: var(--bg-surface);
      color: var(--text-secondary);
      border: 1px solid var(--border-primary);
    }
    .flow-btn--secondary:hover { background: var(--bg-elevated); border-color: var(--border-focus); }
    .flow-btn--danger {
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid var(--red-border);
    }
    .flow-btn--danger:hover { background: rgba(239,68,68,0.18); }
    .flow-btn__icon { font-size: 14px; width: 18px; text-align: center; }

    /* Quick Stats */
    .quick-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .quick-stat {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
    }
    .quick-stat__label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .quick-stat__value {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      margin-top: 2px;
    }
    .quick-stat__value--green { color: var(--green); }
    .quick-stat__value--orange { color: var(--orange); }
    .quick-stat__value--red { color: var(--red); }
    .quick-stat__value--blue { color: var(--blue); }

    /* ===== CENTER PANEL - Markets ===== */
    .center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    /* Market Tabs */
    .market-tabs {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 8px 16px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-primary);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .market-tab {
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: all 0.12s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .market-tab:hover { color: var(--text-secondary); background: var(--bg-surface); }
    .market-tab--active {
      background: var(--bg-surface);
      color: var(--text-primary);
      font-weight: 600;
    }
    .market-tab__count {
      font-size: 10px;
      font-family: var(--font-mono);
      background: var(--bg-input);
      padding: 1px 6px;
      border-radius: 8px;
      color: var(--text-muted);
    }
    .market-tab--active .market-tab__count {
      background: var(--blue-bg);
      color: var(--blue);
    }
    .market-tabs__spacer { flex: 1; }
    .market-tabs__summary {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--text-muted);
      align-items: center;
    }
    .market-tabs__summary-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    /* Search bar in toolbar */
    .market-search {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-sm);
      margin-right: 8px;
    }
    .market-search__icon { color: var(--text-muted); font-size: 12px; }
    .market-search__input {
      background: none;
      border: none;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: 12px;
      outline: none;
      width: 140px;
    }
    .market-search__input::placeholder { color: var(--text-muted); }

    /* Market list */
    .market-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    /* Market Group Header */
    .market-group {
      margin-bottom: 16px;
    }
    .market-group__header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      margin-bottom: 8px;
      cursor: pointer;
      user-select: none;
    }
    .market-group__title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }
    .market-group__line {
      flex: 1;
      height: 1px;
      background: var(--border-subtle);
    }
    .market-group__count {
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .market-group__actions {
      display: flex;
      gap: 4px;
    }

    /* Market Row (compact table-like) */
    .market-row {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      margin-bottom: 6px;
      overflow: hidden;
      transition: border-color 0.12s;
    }
    .market-row:hover { border-color: var(--border-primary); }
    .market-row--suspended { border-left: 3px solid var(--orange); }
    .market-row--closed { border-left: 3px solid var(--red); opacity: 0.7; }
    .market-row--settled { border-left: 3px solid var(--settled); }
    .market-row--open { border-left: 3px solid var(--green); }

    .market-row__header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
    }
    .market-row__star {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-muted);
      padding: 0;
      line-height: 1;
      transition: all 0.12s;
    }
    .market-row__star:hover { color: var(--orange); transform: scale(1.15); }
    .market-row__star--active { color: var(--orange); }
    .market-row__name {
      font-size: 13px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .market-row__specifier {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-input);
      padding: 1px 6px;
      border-radius: var(--radius-xs);
      margin-left: 4px;
    }
    .market-row__badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .market-row__badge--open { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
    .market-row__badge--suspended { background: var(--orange-bg); color: var(--orange); border: 1px solid var(--orange-border); }
    .market-row__badge--closed { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
    .market-row__badge--settled { background: var(--settled-bg); color: var(--settled); border: 1px solid var(--settled-border); }
    .market-row__meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 10px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }
    .market-row__chevron {
      color: var(--text-muted);
      font-size: 11px;
      transition: transform 0.15s;
    }
    .market-row__chevron--collapsed { transform: rotate(-90deg); }

    .market-row__body {
      padding: 0 12px 10px;
    }
    .market-row__body--hidden { display: none; }

    /* Selections */
    .sel-grid {
      display: grid;
      gap: 4px;
    }
    .sel-grid--2 { grid-template-columns: 1fr 1fr; }
    .sel-grid--3 { grid-template-columns: 1fr 1fr 1fr; }
    .sel-grid--list { grid-template-columns: 1fr; }
    .sel-grid--many { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }

    .sel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.12s;
      gap: 8px;
      min-width: 0;
      position: relative;
    }
    .sel:hover { background: var(--bg-elevated); border-color: var(--border-primary); }
    .sel--suspended {
      background: var(--orange-bg);
      border-color: var(--orange-border);
    }
    .sel--suspended .sel__name,
    .sel--suspended .sel__odds,
    .sel--suspended .sel__liability { opacity: 0.35; }
    .sel--winner {
      background: var(--green-bg);
      border-color: var(--green-border);
    }
    .sel--winner .sel__name { color: var(--green); font-weight: 700; }
    .sel__suspended-tag {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--orange);
      background: rgba(245,158,11,0.2);
      padding: 1px 8px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 2;
    }
    .sel__winner-tag {

    function generateInitialHistory(markets) {
      const h = {};
      const now = new Date();
      markets.forEach(m => {
        const entries = [{ time: new Date(now - 3600000), from: null, to: 'open', source: 'System', note: 'Market created' }];
        if (m.status === 'suspended') entries.push({ time: new Date(now - 600000), from: 'open', to: 'suspended', source: 'Provider', note: 'Auto-suspended' });
        if (m.status === 'settled') entries.push(
          { time: new Date(now - 300000), from: 'open', to: 'suspended', source: 'System', note: 'Pre-settlement' },
          { time: new Date(now - 240000), from: 'suspended', to: 'settled', source: 'Trader', note: 'Manual settlement' }
        );
        if (m.status === 'closed') entries.push({ time: new Date(now - 180000), from: 'open', to: 'closed', source: 'Trader', note: 'Market closed' });
        h[m.id] = entries;
      });
      return h;
    }

    function generateInitialOddsHistory(markets) {
      const h = {};
      const now = new Date();
      markets.forEach(m => {
        m.selections.forEach(s => {
          const entries = [];
          for (let i = 4; i >= 0; i--) {
            const drift = (Math.random() - 0.5) * 0.3;
            entries.push({ time: new Date(now - i * 720000 - Math.random() * 300000), odds: i === 0 ? s.odds : Math.max(1.01, Math.round((s.odds + drift) * 100) / 100) });
          }
          h[s.id] = entries;
        });
      });
      return h;
    }

    // ===== MAIN APP =====
    function App() {
      const [markets, setMarkets] = useState(initialMarkets);
      const [parts, setParts] = useState(initialParts);
      const [activeTab, setActiveTab] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');
      const [toast, setToast] = useState(null);
      const [matchTime, setMatchTime] = useState(62);
      const [statusHistory, setStatusHistory] = useState(() => generateInitialHistory(initialMarkets));
      const [oddsHistory, setOddsHistory] = useState(() => generateInitialOddsHistory(initialMarkets));
      const [modal, setModal] = useState(null); // { type, marketId, ... }
      const [showGroupPopup, setShowGroupPopup] = useState(false);

      // Live odds simulation
      useEffect(() => {
        const interval = setInterval(() => {
          const updates = [];
          setMarkets(prev => {
            const next = prev.map(m => ({ ...m, selections: m.selections.map(s => ({ ...s })) }));
            const count = Math.floor(Math.random() * 3) + 1;
            for (let i = 0; i < count; i++) {
              const open = next.filter(m => m.status === 'open');
              if (!open.length) break;
              const m = open[Math.floor(Math.random() * open.length)];
              const active = m.selections.filter(s => s.status === 'active');
              if (!active.length) continue;
              const s = active[Math.floor(Math.random() * active.length)];
              const change = (Math.random() - 0.48) * 0.12;
              const newOdds = Math.max(1.01, Math.round((s.odds + change) * 100) / 100);
              if (newOdds !== s.odds) {
                s.prevOdds = s.odds;
                s.direction = newOdds > s.odds ? 'up' : 'down';
                s.odds = newOdds;
                updates.push({ selId: s.id, odds: newOdds });
              }
              s.liability = Math.max(0, s.liability + Math.floor((Math.random() - 0.3) * 200));
              m.liability = m.selections.reduce((sum, s) => sum + s.liability, 0);
              m.volume += Math.floor(Math.random() * 300);
            }
            return next;
          });
          if (updates.length) {
            setOddsHistory(prev => {
              const next = { ...prev };
              const now = new Date();
              updates.forEach(({ selId, odds }) => { next[selId] = [...(next[selId] || []), { time: now, odds }]; });
              return next;
            });
          }
        }, 2000 + Math.random() * 2000);
        return () => clearInterval(interval);
      }, []);

      // Clear arrows
      useEffect(() => {
        const interval = setInterval(() => {
          setMarkets(prev => prev.map(m => ({ ...m, selections: m.selections.map(s => ({ ...s, direction: null })) })));
        }, 4000);
        return () => clearInterval(interval);
      }, []);

      // Match time
      useEffect(() => {
        const interval = setInterval(() => setMatchTime(t => t < 90 ? t + 1 : t), 30000);
        return () => clearInterval(interval);
      }, []);

      // Keyboard
      useEffect(() => {
        const handler = e => {
          if (e.key === 'g' || e.key === 'G') { e.preventDefault(); setShowGroupPopup(p => !p); }
          if (e.key === 'Escape') { setShowGroupPopup(false); setModal(null); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, []);

      const toggleFavorite = useCallback(id => {
        setMarkets(prev => prev.map(m => m.id === id ? { ...m, favorite: !m.favorite } : m));
      }, []);

      const setMarketStatus = useCallback((id, status) => {
        setMarkets(prev => {
          const m = prev.find(x => x.id === id);
          if (m) {
            setStatusHistory(h => ({ ...h, [id]: [...(h[id] || []), { time: new Date(), from: m.status, to: status, source: 'Trader', note: 'Manual' }] }));
          }
          return prev.map(m => {
            if (m.id !== id) return m;
            const selStatus = status === 'open' ? 'active' : 'suspended';
            return { ...m, status, settled: status === 'open' ? null : m.settled, selections: m.selections.map(s => ({ ...s, status: selStatus })) };
          });
        });
        setToast({ message: `Market ${status}`, type: status === 'open' ? 'success' : 'warning' });
      }, []);

      const toggleSelection = useCallback((mId, sId) => {
        setMarkets(prev => prev.map(m => {
          if (m.id !== mId) return m;
          return { ...m, selections: m.selections.map(s => s.id === sId ? { ...s, status: s.status === 'active' ? 'suspended' : 'active' } : s) };
        }));
      }, []);

      const settleMarket = useCallback((mId, winnerId) => {
        setMarkets(prev => {
          setStatusHistory(h => ({ ...h, [mId]: [...(h[mId] || []), { time: new Date(), from: prev.find(m => m.id === mId)?.status, to: 'settled', source: 'Trader', note: `Settled: winner=${winnerId}` }] }));
          return prev.map(m => m.id === mId ? { ...m, status: 'settled', settled: winnerId, selections: m.selections.map(s => ({ ...s, status: 'suspended' })) } : m);
        });
        setModal(null);
        setToast({ message: 'Market settled', type: 'success' });
      }, []);

      const rollbackSettlement = useCallback(mId => {
        setMarkets(prev => {
          setStatusHistory(h => ({ ...h, [mId]: [...(h[mId] || []), { time: new Date(), from: 'settled', to: 'suspended', source: 'Trader', note: 'Settlement rolled back' }] }));
          return prev.map(m => m.id === mId ? { ...m, status: 'suspended', settled: null } : m);
        });
        setToast({ message: 'Settlement rolled back', type: 'info' });
      }, []);

      const cancelMarket = useCallback((mId, reason) => {
        setMarkets(prev => {
          setStatusHistory(h => ({ ...h, [mId]: [...(h[mId] || []), { time: new Date(), from: prev.find(m => m.id === mId)?.status, to: 'closed', source: 'Trader', note: `Cancelled: ${reason}` }] }));
          return prev.map(m => m.id === mId ? { ...m, status: 'closed', selections: m.selections.map(s => ({ ...s, status: 'suspended' })) } : m);
        });
        setModal(null);
        setToast({ message: 'Market cancelled', type: 'error' });
      }, []);

      const handleGroupAction = useCallback((groupKey, status) => {
        setMarkets(prev => {
          const now = new Date();
          setStatusHistory(h => {
            const next = { ...h };
            prev.filter(m => m.group === groupKey && m.status !== 'settled').forEach(m => {
              next[m.id] = [...(next[m.id] || []), { time: now, from: m.status, to: status, source: 'Trader', note: 'Group action' }];
            });
            return next;
          });
          return prev.map(m => {
            if (m.group !== groupKey || m.status === 'settled') return m;
            return { ...m, status, selections: m.selections.map(s => ({ ...s, status: status === 'open' ? 'active' : 'suspended' })) };
          });
        });
        setToast({ message: `Group ${status}`, type: status === 'open' ? 'success' : 'warning' });
        setShowGroupPopup(false);
      }, []);

      const openAll = useCallback(() => {
        setMarkets(prev => prev.map(m => m.status === 'settled' ? m : { ...m, status: 'open', selections: m.selections.map(s => ({ ...s, status: 'active' })) }));
        setToast({ message: 'All markets opened', type: 'success' });
      }, []);

      const suspendAll = useCallback(() => {
        setMarkets(prev => prev.map(m => m.status === 'settled' ? m : { ...m, status: 'suspended', selections: m.selections.map(s => ({ ...s, status: 'suspended' })) }));
        setToast({ message: 'All markets suspended', type: 'warning' });
      }, []);

      const handlePartAction = useCallback(action => {
        setToast({ message: `Action: ${action}`, type: 'info' });
      }, []);

      // Filter markets
      const filteredMarkets = useMemo(() => {
        let list = markets;
        if (activeTab !== 'all') list = list.filter(m => m.group === activeTab);
        if (searchQuery.trim()) {
          const q = searchQuery.toLowerCase();
          list = list.filter(m => m.name.toLowerCase().includes(q) || (m.specifier && m.specifier.includes(q)));
        }
        return list;
      }, [markets, activeTab, searchQuery]);

      // Group filtered markets by group
      const groupedMarkets = useMemo(() => {
        if (activeTab !== 'all') return { [activeTab]: filteredMarkets };
        const groups = {};
        filteredMarkets.forEach(m => {
          if (!groups[m.group]) groups[m.group] = [];
          groups[m.group].push(m);
        });
        return groups;
      }, [filteredMarkets, activeTab]);

      const totalLiability = markets.reduce((s, m) => s + m.liability, 0);

      // Tab counts
      const tabCounts = useMemo(() => {
        const c = { all: markets.length };
        markets.forEach(m => { c[m.group] = (c[m.group] || 0) + 1; });
        return c;
      }, [markets]);

      const openCount = markets.filter(m => m.status === 'open').length;
      const suspendedCount = markets.filter(m => m.status === 'suspended').length;
      const closedCount = markets.filter(m => m.status === 'closed').length;
      const settledCount = markets.filter(m => m.status === 'settled').length;

      return (
        <>
          <TopBar />
          <MatchHero totalLiability={totalLiability} matchTime={matchTime} markets={markets} onOpenAll={openAll} onSuspendAll={suspendAll} />
          <div className="main-layout">
            <LeftPanel parts={parts} onPartAction={handlePartAction} />
            <div className="center-panel">
              <div className="market-tabs">
                {Object.entries(MARKET_GROUPS).map(([key, g]) => (
                  <button key={key} className={`market-tab ${activeTab === key ? 'market-tab--active' : ''}`} onClick={() => setActiveTab(key)}>
                    {g.name}
                    <span className="market-tab__count">{tabCounts[key] || 0}</span>
                  </button>
                ))}
                <div className="market-tabs__spacer"></div>
                <div className="market-search">
                  <span className="market-search__icon">&#128269;</span>
                  <input className="market-search__input" placeholder="Search markets..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                </div>
                <div className="market-tabs__summary">
                  <span><span className="market-tabs__summary-dot" style={{background:'var(--green)'}}></span>{openCount}</span>
                  <span><span className="market-tabs__summary-dot" style={{background:'var(--orange)'}}></span>{suspendedCount}</span>
                  <span><span className="market-tabs__summary-dot" style={{background:'var(--settled)'}}></span>{settledCount}</span>
                  <span><span className="market-tabs__summary-dot" style={{background:'var(--red)'}}></span>{closedCount}</span>
                </div>
              </div>
              <div className="market-list">
                {Object.entries(groupedMarkets).map(([groupKey, groupMarkets]) => (
                  <div className="market-group" key={groupKey}>
                    {activeTab === 'all' && (
                      <div className="market-group__header">
                        <span className="market-group__title">{MARKET_GROUPS[groupKey]?.name || groupKey}</span>
                        <span className="market-group__line"></span>
                        <span className="market-group__count">{groupMarkets.length}</span>
                      </div>
                    )}
                    {groupMarkets.map(m => (
                      <MarketRow
                        key={m.id}
                        market={m}
                        onToggleFavorite={toggleFavorite}
                        onSetStatus={setMarketStatus}
                        onToggleSelection={toggleSelection}
                        onShowHistory={id => setModal({ type: 'history', marketId: id })}
                        onShowOddsHistory={id => setModal({ type: 'odds', marketId: id })}
                        onSettle={id => setModal({ type: 'settle', marketId: id })}
                        onCancelMarket={id => setModal({ type: 'cancel', marketId: id })}
                        onRollback={rollbackSettlement}
                      />
                    ))}
                  </div>
                ))}
                {filteredMarkets.length === 0 && (
                  <div style={{textAlign:'center',padding:40,color:'var(--text-muted)'}}>No markets found</div>
                )}
              </div>
            </div>
          </div>

          {showGroupPopup && <GroupModal markets={markets} onGroupAction={handleGroupAction} onClose={() => setShowGroupPopup(false)} />}

          {modal?.type === 'history' && (
            <StatusHistoryModal market={markets.find(m => m.id === modal.marketId)} history={statusHistory[modal.marketId]} onClose={() => setModal(null)} />
          )}
          {modal?.type === 'odds' && (
            <OddsHistoryModal market={markets.find(m => m.id === modal.marketId)} oddsHistory={oddsHistory} onClose={() => setModal(null)} />
          )}
          {modal?.type === 'settle' && (
            <SettleModal market={markets.find(m => m.id === modal.marketId)} onConfirm={settleMarket} onClose={() => setModal(null)} />
          )}
          {modal?.type === 'cancel' && (
            <CancelModal market={markets.find(m => m.id === modal.marketId)} onConfirm={cancelMarket} onClose={() => setModal(null)} />
          )}

          {toast && <Toast message={toast.message} type={toast.type} onDone={() => setToast(null)} />}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
